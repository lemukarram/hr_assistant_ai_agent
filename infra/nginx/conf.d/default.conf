upstream backend_api {
    server backend:8000;
    keepalive 32;
}

upstream mcp_api {
    server mcp-server:8001;
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;
    charset utf-8;

    # Security headers
    add_header X-Frame-Options          DENY                                always;
    add_header X-Content-Type-Options   nosniff                             always;
    add_header X-XSS-Protection         "1; mode=block"                    always;
    add_header Referrer-Policy          strict-origin-when-cross-origin     always;
    add_header Permissions-Policy       "camera=(), microphone=()"          always;

    # ── API reverse proxy ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend_api/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # SSE: disable buffering for streaming chat responses
        proxy_buffering          off;
        proxy_cache              off;
        proxy_read_timeout       300s;
        proxy_connect_timeout    10s;
        chunked_transfer_encoding on;
    }

    # ── MCP Inspector (dev convenience) ───────────────────────────────────
    location /mcp/ {
        proxy_pass         http://mcp_api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_buffering    off;
        proxy_read_timeout 120s;
    }

    # ── Health endpoint (used by Docker healthcheck) ───────────────────────
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Frontend SPA ──────────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressive caching for hashed static assets
    location ~* \.(js|css|woff|woff2|ttf|svg|png|jpg|ico)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html: never cache (SPA shell)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
