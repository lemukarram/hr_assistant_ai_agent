[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = true
log_cli_level = INFO
markers =
    unit: Unit tests (no external services)
    integration: Integration tests (requires DB)
    e2e: End-to-end tests (requires full stack)
    slow: Slow tests involving LLM calls
